<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시스템 모니터링 대시보드</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
        color: white;
      }

      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .last-updated {
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .metric-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .metric-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      }

      .metric-header {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
      }

      .metric-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 15px;
        font-size: 1.2rem;
      }

      .metric-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: #2c3e50;
      }

      .metric-value {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .metric-subtitle {
        color: #7f8c8d;
        font-size: 0.9rem;
        margin-bottom: 15px;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #ecf0f1;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .progress-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease, background-color 0.3s ease;
      }

      .status-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 8px;
      }

      .status-good {
        background: #27ae60;
      }
      .status-warning {
        background: #f39c12;
      }
      .status-danger {
        background: #e74c3c;
      }

      .cpu-icon {
        background: linear-gradient(45deg, #3498db, #2980b9);
        color: white;
      }
      .memory-icon {
        background: linear-gradient(45deg, #e74c3c, #c0392b);
        color: white;
      }
      .threads-icon {
        background: linear-gradient(45deg, #f39c12, #e67e22);
        color: white;
      }
      .http-icon {
        background: linear-gradient(45deg, #27ae60, #229954);
        color: white;
      }
      .tomcat-icon {
        background: linear-gradient(45deg, #9b59b6, #8e44ad);
        color: white;
      }
      .gc-icon {
        background: linear-gradient(45deg, #1abc9c, #16a085);
        color: white;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 15px;
      }

      .detail-item {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 8px;
        border-left: 4px solid #3498db;
      }

      .detail-label {
        font-size: 0.8rem;
        color: #7f8c8d;
        margin-bottom: 5px;
      }

      .detail-value {
        font-size: 1.1rem;
        font-weight: 600;
        color: #2c3e50;
      }

      .error-message {
        color: #e74c3c;
        font-style: italic;
        padding: 10px;
        background: #fdf2f2;
        border-radius: 8px;
        border-left: 4px solid #e74c3c;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 2rem;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .detail-grid {
          grid-template-columns: 1fr;
        }
      }

      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🚀 시스템 모니터링 대시보드</h1>
        <div class="last-updated">
          마지막 업데이트: <span id="lastUpdate">로딩 중...</span>
        </div>
      </div>

      <div class="grid">
        <!-- CPU 사용률 -->
        <div class="metric-card">
          <div class="metric-header">
            <div class="metric-icon cpu-icon">🔥</div>
            <div class="metric-title">CPU 사용률</div>
          </div>
          <div id="cpu-status" class="status-indicator status-good"></div>
          <div id="cpu-value" class="metric-value">--%</div>
          <div class="metric-subtitle">시스템 프로세서 사용률</div>
          <div class="progress-bar">
            <div
              id="cpu-progress"
              class="progress-fill"
              style="
                width: 0%;
                background: linear-gradient(90deg, #27ae60, #f39c12, #e74c3c);
              "
            ></div>
          </div>
          <div id="cpu-details"></div>
        </div>

        <!-- 메모리 사용률 -->
        <div class="metric-card">
          <div class="metric-header">
            <div class="metric-icon memory-icon">💾</div>
            <div class="metric-title">JVM 메모리</div>
          </div>
          <div id="memory-status" class="status-indicator status-good"></div>
          <div id="memory-value" class="metric-value">-- MB</div>
          <div class="metric-subtitle">힙 메모리 사용량</div>
          <div class="progress-bar">
            <div
              id="memory-progress"
              class="progress-fill"
              style="
                width: 0%;
                background: linear-gradient(90deg, #27ae60, #f39c12, #e74c3c);
              "
            ></div>
          </div>
          <div id="memory-details"></div>
        </div>

        <!-- 스레드 정보 -->
        <div class="metric-card">
          <div class="metric-header">
            <div class="metric-icon threads-icon">🧵</div>
            <div class="metric-title">JVM 스레드</div>
          </div>
          <div id="threads-status" class="status-indicator status-good"></div>
          <div id="threads-value" class="metric-value">--개</div>
          <div class="metric-subtitle">활성 스레드 수</div>
          <div id="threads-details"></div>
        </div>

        <!-- HTTP 요청 -->
        <div class="metric-card">
          <div class="metric-header">
            <div class="metric-icon http-icon">🌐</div>
            <div class="metric-title">HTTP 요청</div>
          </div>
          <div id="http-status" class="status-indicator status-good"></div>
          <div id="http-value" class="metric-value">--건</div>
          <div class="metric-subtitle">총 처리된 요청 수</div>
          <div id="http-details"></div>
        </div>

        <!-- Tomcat 스레드 -->
        <div class="metric-card">
          <div class="metric-header">
            <div class="metric-icon tomcat-icon">🐱</div>
            <div class="metric-title">Tomcat 스레드</div>
          </div>
          <div id="tomcat-status" class="status-indicator status-good"></div>
          <div id="tomcat-value" class="metric-value">--개</div>
          <div class="metric-subtitle">현재 활성 스레드</div>
          <div class="progress-bar">
            <div
              id="tomcat-progress"
              class="progress-fill"
              style="
                width: 0%;
                background: linear-gradient(90deg, #27ae60, #f39c12, #e74c3c);
              "
            ></div>
          </div>
          <div id="tomcat-details"></div>
        </div>

        <!-- GC 정보 -->
        <div class="metric-card">
          <div class="metric-header">
            <div class="metric-icon gc-icon">🗑️</div>
            <div class="metric-title">가비지 컬렉션</div>
          </div>
          <div id="gc-status" class="status-indicator status-good"></div>
          <div id="gc-value" class="metric-value">--회</div>
          <div class="metric-subtitle">GC 실행 횟수</div>
          <div id="gc-details"></div>
        </div>
      </div>
    </div>

    <script>
      async function loadMetric(name, params = "") {
        try {
          const res = await fetch(`/actuator/metrics/${name}${params}`);
          return res.ok ? res.json() : { error: res.status };
        } catch (e) {
          return { error: "Network Error" };
        }
      }

      function formatBytes(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      }

      function getStatusClass(value, thresholds) {
        if (value >= thresholds.danger) return "status-danger";
        if (value >= thresholds.warning) return "status-warning";
        return "status-good";
      }

      function updateProgressBar(elementId, percentage) {
        const progressBar = document.getElementById(elementId);
        if (progressBar) {
          progressBar.style.width = `${Math.min(percentage, 100)}%`;
        }
      }

      function createDetailGrid(details) {
        return `
        <div class="detail-grid">
          ${details
            .map(
              (detail) => `
            <div class="detail-item">
              <div class="detail-label">${detail.label}</div>
              <div class="detail-value">${detail.value}</div>
            </div>
          `
            )
            .join("")}
        </div>
      `;
      }

      function showError(elementId, error) {
        document.getElementById(
          elementId
        ).innerHTML = `<div class="error-message">데이터 로드 실패: ${error}</div>`;
      }

      async function refreshMetrics() {
        const updateTime = new Date().toLocaleString("ko-KR");
        document.getElementById("lastUpdate").textContent = updateTime;

        try {
          // CPU 사용률
          const cpu = await loadMetric("system.cpu.usage");
          if (cpu.error) {
            showError("cpu-details", cpu.error);
          } else {
            const cpuUsage = Math.round(cpu.measurements[0].value * 100);
            document.getElementById("cpu-value").textContent = `${cpuUsage}%`;
            document.getElementById(
              "cpu-status"
            ).className = `status-indicator ${getStatusClass(cpuUsage, {
              warning: 70,
              danger: 85,
            })}`;
            updateProgressBar("cpu-progress", cpuUsage);

            document.getElementById("cpu-details").innerHTML = createDetailGrid(
              [
                { label: "CPU 사용률", value: `${cpuUsage}%` },
                {
                  label: "상태",
                  value:
                    cpuUsage < 70 ? "정상" : cpuUsage < 85 ? "주의" : "위험",
                },
              ]
            );
          }

          // 메모리 사용률
          const memoryUsed = await loadMetric(
            "jvm.memory.used",
            "?tag=area:heap"
          );
          const memoryMax = await loadMetric(
            "jvm.memory.max",
            "?tag=area:heap"
          );

          if (memoryUsed.error || memoryMax.error) {
            showError("memory-details", "Memory metrics unavailable");
          } else {
            const used = memoryUsed.measurements[0].value;
            const max = memoryMax.measurements[0].value;
            const usagePercent = Math.round((used / max) * 100);

            document.getElementById("memory-value").textContent =
              formatBytes(used);
            document.getElementById(
              "memory-status"
            ).className = `status-indicator ${getStatusClass(usagePercent, {
              warning: 80,
              danger: 90,
            })}`;
            updateProgressBar("memory-progress", usagePercent);

            document.getElementById("memory-details").innerHTML =
              createDetailGrid([
                { label: "사용량", value: formatBytes(used) },
                { label: "최대", value: formatBytes(max) },
                { label: "사용률", value: `${usagePercent}%` },
                { label: "여유 공간", value: formatBytes(max - used) },
              ]);
          }

          // 스레드 정보
          const threadsLive = await loadMetric("jvm.threads.live");
          const threadsPeak = await loadMetric("jvm.threads.peak");

          if (threadsLive.error) {
            showError("threads-details", threadsLive.error);
          } else {
            const liveCount = threadsLive.measurements[0].value;
            const peakCount = threadsPeak.error
              ? "N/A"
              : threadsPeak.measurements[0].value;

            document.getElementById(
              "threads-value"
            ).textContent = `${liveCount}개`;
            document.getElementById(
              "threads-status"
            ).className = `status-indicator ${getStatusClass(liveCount, {
              warning: 50,
              danger: 100,
            })}`;

            document.getElementById("threads-details").innerHTML =
              createDetailGrid([
                { label: "활성 스레드", value: `${liveCount}개` },
                { label: "최대 스레드", value: `${peakCount}개` },
              ]);
          }

          // HTTP 요청
          const http = await loadMetric("http.server.requests");
          if (http.error) {
            showError("http-details", http.error);
          } else {
            const totalRequests =
              http.measurements.find((m) => m.statistic === "COUNT")?.value ||
              0;
            const avgTime =
              http.measurements.find((m) => m.statistic === "TOTAL_TIME")
                ?.value / totalRequests || 0;

            document.getElementById("http-value").textContent = `${Math.round(
              totalRequests
            )}건`;
            document.getElementById("http-status").className =
              "status-indicator status-good";

            document.getElementById("http-details").innerHTML =
              createDetailGrid([
                { label: "총 요청", value: `${Math.round(totalRequests)}건` },
                { label: "평균 응답시간", value: `${avgTime.toFixed(2)}ms` },
              ]);
          }

          // Tomcat 스레드
          const tomcatCurrent = await loadMetric("tomcat.threads.current");
          const tomcatBusy = await loadMetric("tomcat.threads.busy");
          const tomcatConfig = await loadMetric("tomcat.threads.config.max");

          if (tomcatCurrent.error) {
            showError("tomcat-details", tomcatCurrent.error);
          } else {
            const current = tomcatCurrent.measurements[0].value;
            const busy = tomcatBusy.error
              ? 0
              : tomcatBusy.measurements[0].value;
            const maxThreads = tomcatConfig.error
              ? 200
              : tomcatConfig.measurements[0].value;
            const busyPercent = Math.round((busy / current) * 100);

            document.getElementById(
              "tomcat-value"
            ).textContent = `${current}개`;
            document.getElementById(
              "tomcat-status"
            ).className = `status-indicator ${getStatusClass(busyPercent, {
              warning: 70,
              danger: 85,
            })}`;
            updateProgressBar("tomcat-progress", (current / maxThreads) * 100);

            document.getElementById("tomcat-details").innerHTML =
              createDetailGrid([
                { label: "현재 스레드", value: `${current}개` },
                { label: "사용 중", value: `${busy}개` },
                { label: "최대 스레드", value: `${maxThreads}개` },
                { label: "사용률", value: `${busyPercent}%` },
              ]);
          }

          // GC 정보
          const gcCount = await loadMetric(
            "jvm.gc.pause",
            "?tag=action:end of minor GC"
          );
          if (gcCount.error) {
            showError("gc-details", gcCount.error);
          } else {
            const count =
              gcCount.measurements.find((m) => m.statistic === "COUNT")
                ?.value || 0;
            const totalTime =
              gcCount.measurements.find((m) => m.statistic === "TOTAL_TIME")
                ?.value || 0;

            document.getElementById("gc-value").textContent = `${Math.round(
              count
            )}회`;
            document.getElementById("gc-status").className =
              "status-indicator status-good";

            document.getElementById("gc-details").innerHTML = createDetailGrid([
              { label: "GC 횟수", value: `${Math.round(count)}회` },
              { label: "총 GC 시간", value: `${totalTime.toFixed(2)}ms` },
            ]);
          }
        } catch (e) {
          console.error("Metrics refresh error:", e);
        }
      }

      // 초기화 및 주기적 업데이트
      (async function init() {
        await refreshMetrics();
        setInterval(refreshMetrics, 2000); // 2초마다 업데이트
      })();
    </script>
  </body>
</html>
